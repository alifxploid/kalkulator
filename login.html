<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen flex items-center justify-center bg-gray-100">
  <form class="bg-white p-6 rounded shadow-md w-full max-w-sm">
    <h2 class="text-2xl mb-4 text-center font-bold">Login</h2>
    <div class="mb-4">
      <label for="username" class="block text-gray-700">Username</label>
      <input id="username" type="text" class="w-full border px-3 py-2 rounded" placeholder="Username" />
    </div>
    <div class="mb-6">
      <label for="password" class="block text-gray-700">Password</label>
      <input id="password" type="password" class="w-full border px-3 py-2 rounded" placeholder="Password" />
    </div>
    <button type="submit" class="w-full bg-blue-500 text-white py-2 rounded hover:bg-blue-600 transition">Login</button>
  </form>
</body>
</html>
